on:
    push:
        branches:
            - master
            - main
    pull_request:
name: Security

permissions:
  contents: read

jobs:
  Gosec:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run Gosec
        uses: securego/gosec@85814f2e3964a6d38aeb6e6002ac9268c16fcab5 # master
        with:
          args: ./...
