on:
    push:
        branches:
            - master
            - main
    pull_request:
name: Security

permissions:
  contents: read

jobs:
  Gosec:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run Gosec
        uses: securego/gosec@bd17b2589eb634e511b352f14fc30cb40863eefe # master
        with:
          args: ./...
