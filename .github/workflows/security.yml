on:
    push:
        branches:
            - master
            - main
    pull_request:
name: Security

permissions:
  contents: read

jobs:
  Gosec:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run Gosec
        uses: securego/gosec@9addc97cefc9460a114e3c36f536b935da3b98c9 # master
        with:
          args: ./...
