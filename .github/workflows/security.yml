on:
    push:
        branches:
            - master
            - main
    pull_request:
name: Security

permissions:
  contents: read

jobs:
  Gosec:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run Gosec
        uses: securego/gosec@f1c81de5fcdf7b466b229fb24ca02d1a8406dd09 # master
        with:
          args: ./...
